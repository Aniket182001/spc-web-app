{% extends "base.html" %}

{% block title %}Report -QPulse Analytics{% endblock %}

{% block content %}
<section class="auth-shell">
  <div class="card auth-card">
    <div class="card-header">
      <div class="card-header-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 2.5h5l3 3v8a1 1 0 01-1 1H4a1 1 0 01-1-1v-10a1 1 0 011-1z" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 2.5V6h3" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M5.5 9h5M5.5 11.5h4" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="card-title">Generating Report</div>
        <div class="card-subtitle">Your SPC report is ready to download</div>
      </div>
    </div>

    <div class="card-body">
      <a href="{{ report_url }}" class="btn-primary" download>Download PDF Report</a>
      <div class="auth-footer">
        <a href="{{ url_for('spc.dashboard') }}">Return to control chart analysis</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
