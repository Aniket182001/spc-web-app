{% extends "base.html" %}

{% block title %}Login - SPC Insight Pro{% endblock %}

{% block content %}
<section class="auth-shell">
  <div class="card auth-card">
    <div class="card-header">
      <div class="card-header-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 7V5a4 4 0 018 0v2" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="3" y="7" width="10" height="7" rx="1.5" stroke-width="1.5"/>
          <path d="M8 10v1.5" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="card-title">Account Login</div>
        <div class="card-subtitle">Access SPC Insight Pro</div>
      </div>
    </div>

    <div class="card-body">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="flash">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn-primary">Login</button>
      </form>

    </div>
  </div>
</section>
{% endblock %}
