<!DOCTYPE html>
<html>
<head>
    <title>SPC Control Chart Tool</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 850px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
        }

        input, 
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            margin-top: 25px;
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .warning {
            background-color: #fff7ed;
            color: #c2410c;
            border: 1px solid #fdba74;
        }

        .insight {
            background-color: #ecfeff;
            color: #155e75;
            border: 1px solid #67e8f9;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.08);
        }

    </style>

</head>

<body>

<div class="container">

    <h1>📊 SPC Control Chart Tool</h1>

    <div class="card">

        <form action="/upload" method="post" enctype="multipart/form-data">

            <label>Upload Data File</label>
            <input type="file" name="file" accept=".xlsx,.xls,.csv,.txt" required>

            <label>Select Chart Type</label>
            <select name="chart">

                <option value="xbar_r">Xbar-R Chart</option>
                <option value="xbar_s">Xbar-S Chart</option>

            </select>

            <label>Select Chart Type</label>
            <select name="chart">

                <option value="xbar_r">Xbar-R Chart</option>
                <option value="xbar_s">Xbar-S Chart</option>

            </select>

            <label>Subgroup Size</label>
            <input type="number" name="subgroup_size" min="2" max="25" required>

            <label>LSL (Optional)</label>
            <input type="number" step="any" name="lsl">

            <label>USL (Optional)</label>
            <input type="number" step="any" name="usl">

            <button type="submit">
                Generate Control Chart
            </button>

        </form>

    </div>

    {% if warning %}
        <div class="message warning">
            {{ warning }}
        </div>
    {% endif %}

    {% if insight %}
        <div class="message insight">
            {{ insight|safe }}
        </div>
    {% endif %}

    {% if graph %}
        <div class="chart-container">
            {{ graph|safe }}
        </div>
    {% endif %}

</div>

</body>
</html>
