<!DOCTYPE html>
<html>

<head>

    <title>SPC Control Chart Tool</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }

        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 18px;
            margin-bottom: 8px;
            color: #334155;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0px 0px 0px 3px rgba(37, 99, 235, 0.15);
        }

        button {
            margin-top: 30px;
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .message {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.6;
        }

        .warning {
            background-color: #fff7ed;
            color: #c2410c;
            border: 1px solid #fdba74;
        }

        .insight {
            background-color: #ecfeff;
            color: #155e75;
            border: 1px solid #67e8f9;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.08);
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- ========================================= -->
        <!-- TITLE -->
        <!-- ========================================= -->

        <h1>Control Chart Tool</h1>

        <!-- ========================================= -->
        <!-- FORM CARD -->
        <!-- ========================================= -->

        <div class="card">

            <form action="/upload" method="post" enctype="multipart/form-data">

                <!-- FILE -->

                <label>Upload Data File</label>

                <input
                    type="file"
                    name="file"
                    accept=".xlsx,.xls,.csv,.txt"
                    required
                >

                <!-- CHART NAME -->

                <label>Chart Name</label>

                <input
                    type="text"
                    name="chart_name"
                    placeholder="e.g. Daily Production"
                >

                <!-- CHART TYPE -->

                <label>Select Chart Type</label>

                <select name="chart" id="chart-select">

                    <option value="xbar_r">Xbar-R Chart</option>

                    <option value="xbar_s">Xbar-S Chart</option>

                    <option value="p_chart">P Chart</option>

                    <option value="np_chart">NP Chart</option>

                    <option value="c_chart">C Chart</option>

                    <option value="u_chart">U Chart</option>

                    <option value="imr_chart">IMR Chart</option>

                </select>

                <!-- SUBGROUP SIZE -->

                <div id="subgroup-container">

                    <label>Subgroup Size</label>

                    <input
                        type="number"
                        id="subgroup-input"
                        name="subgroup_size"
                        min="2"
                        max="25"
                    >

                </div>

                <!-- SAMPLE SIZE -->

                <div id="sample-size-container" style="display:none;">

                    <label>Sample Size</label>

                    <input
                        type="number"
                        name="sample_size"
                        min="1"
                    >

                </div>

                <!-- SPEC LIMITS -->

                <div id="spec-limit-container">

                    <label>Lower Specification Limit (LSL)</label>

                    <input
                        type="number"
                        step="any"
                        name="lsl"
                    >

                    <label>Upper Specification Limit (USL)</label>

                    <input
                        type="number"
                        step="any"
                        name="usl"
                    >

                </div>

                <!-- BUTTON -->

                <button type="submit">

                    Generate Control Chart

                </button>

            </form>

        </div>

        <!-- ========================================= -->
        <!-- WARNING -->
        <!-- ========================================= -->

        {% if warning %}

            <div class="message warning">

                {{ warning }}

            </div>

        {% endif %}

        <!-- ========================================= -->
        <!-- INSIGHTS -->
        <!-- ========================================= -->

        {% if insight %}

            <div class="message insight">

                {{ insight|safe }}

            </div>

        {% endif %}

        <!-- ========================================= -->
        <!-- CHART -->
        <!-- ========================================= -->

        {% if graph %}

            <div class="chart-container">

                {{ graph|safe }}

            </div>

        {% endif %}

    </div>

    <!-- ========================================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================================= -->

    <script>

        const subgroupInput = document.getElementById(
        "subgroup-input"
        );

        const chartSelect = document.getElementById(
            "chart-select"
        );

        const subgroupContainer = document.getElementById(
            "subgroup-container"
        );

        const sampleSizeContainer = document.getElementById(
            "sample-size-container"
        );

        const specLimitContainer = document.getElementById(
            "spec-limit-container"
        );

        function toggleFields() {

            const chartType = chartSelect.value;

            // =====================================
            // P & NP CHARTS
            // =====================================

            if (
                chartType === "p_chart" ||
                chartType === "np_chart"
            ) {

                sampleSizeContainer.style.display = "block";

                subgroupContainer.style.display = "none";

                specLimitContainer.style.display = "none";

                subgroupInput.required = false;
            }

            // =====================================
            // C CHART
            // =====================================

            else if (
                chartType === "c_chart"
            ) {

                sampleSizeContainer.style.display = "none";

                subgroupContainer.style.display = "none";

                specLimitContainer.style.display = "none";

                subgroupInput.required = false;
            }

            // =====================================
            // C CHART
            // =====================================

            else if (
                chartType === "u_chart"
            ) {

                sampleSizeContainer.style.display = "block";

                subgroupContainer.style.display = "none";

                specLimitContainer.style.display = "none";

                subgroupInput.required = false;
            }

            // =====================================
            // IMR CHART
            // =====================================

            else if (
                chartType === "imr_chart"
            ) {

                sampleSizeContainer.style.display = "none";

                subgroupContainer.style.display = "none";

                specLimitContainer.style.display = "block";

                subgroupInput.required = false;
            }

            // =====================================
            // XBAR CHARTS
            // =====================================

            else {

                sampleSizeContainer.style.display = "none";

                subgroupContainer.style.display = "block";

                specLimitContainer.style.display = "block";

                subgroupInput.required = true;
            }
        }

        // Run on dropdown change

        chartSelect.addEventListener(
            "change",
            toggleFields
        );

        // Run on page load

        toggleFields();

    </script>

</body>

</html>
