<!DOCTYPE html>
<html>
<head>
    <title>SPC Tool</title>
</head>
<body>

<h2>Upload Data</h2>

<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required><br><br>

    <label>Select Chart:</label>
    <select name="chart">
        <option value="xbar_r">Xbar-R</option>
        <option value="xbar_s">Xbar-S</option>
    </select><br><br>

    <label>Subgroup Size:</label>
    <input type="number" name="subgroup_size" min="2" max="10" required><br><br>

    <button type="submit">Generate Chart</button>
</form>

<br><br>

{% if graph %}
    {{ graph|safe }}
{% endif %}

{% if insight %}
    <p>{{ insight }}</p>
{% endif %}

{% if warning %}
    <p style="color:orange;"><strong>{{ warning }}</strong></p>
{% endif %}

</body>
</html>
